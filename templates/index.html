<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS Battle Game</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body>
    <div id="game-container">
        <!-- HOME SCREEN -->
        <div id="home-screen" class="screen">
            <h1>RPS BATTLE</h1>
            <button onclick="showScreen('create-room-screen')">ルーム作成</button>
            <button onclick="showScreen('join-room-screen')">ルーム参加</button>
            <button onclick="showScreen('how-to-play-screen')">遊び方説明</button>
        </div>

        <!-- HOW TO PLAY -->
        <div id="how-to-play-screen" class="screen hidden">
            <h2>遊び方</h2>
            <p>1. ルームを作成または参加します。</p>
            <p>2. 各手（グー・チョキ・パー）の攻撃力と防御力を設定します。</p>
            <p>3. コストを管理しながら相手のHPを0にすれば勝利！</p>
            <button onclick="showScreen('home-screen')">戻る</button>
        </div>

        <!-- CREATE ROOM -->
        <div id="create-room-screen" class="screen hidden">
            <h2>ルーム作成</h2>
            <input type="text" id="create-username" placeholder="ユーザー名">
            <div id="room-code-display" class="big-text">----</div>
            <button onclick="createRoom()">作成</button>
            <button onclick="showScreen('home-screen')">戻る</button>
        </div>

        <!-- JOIN ROOM -->
        <div id="join-room-screen" class="screen hidden">
            <h2>ルーム参加</h2>
            <input type="text" id="join-username" placeholder="ユーザー名">
            <input type="number" id="join-room-id" placeholder="4桁の数字">
            <button onclick="joinRoom()">参加</button>
            <button onclick="showScreen('home-screen')">戻る</button>
        </div>

        <!-- PREP SCREEN -->
        <div id="prep-screen" class="screen hidden">
            <h2>準備画面</h2>
            <div class="prep-controls">
                <div class="hand-config" id="config-rock">
                    <h3>グー</h3>
                    攻撃: <input type="number" class="atk" value="0" min="0" max="10">
                    防御: <input type="number" class="def" value="0" min="0" max="5">
                </div>
                <div class="hand-config" id="config-scissors">
                    <h3>チョキ</h3>
                    攻撃: <input type="number" class="atk" value="0" min="0" max="10">
                    防御: <input type="number" class="def" value="0" min="0" max="5">
                </div>
                <div class="hand-config" id="config-paper">
                    <h3>パー</h3>
                    攻撃: <input type="number" class="atk" value="0" min="0" max="10">
                    防御: <input type="number" class="def" value="0" min="0" max="5">
                </div>
            </div>
            <p>コストは攻撃＋防御の合計です。</p>
            <button onclick="submitPrep()">準備完了</button>
        </div>

        <!-- SELECTION SCREEN -->
        <div id="selection-screen" class="screen hidden">
            <div class="battle-layout">
                <div class="player-info" id="my-info">
                    <h3 class="username">自分</h3>
                    <div class="hp-bar-container"><div class="hp-bar"></div></div>
                    <div class="hp-text">HP: 10/10</div>
                    <div class="cost-text">残りコスト: 10</div>
                    <div class="hand-list">
                        <button onclick="selectHand('rock')" id="btn-rock">グー</button>
                        <button onclick="selectHand('scissors')" id="btn-scissors">チョキ</button>
                        <button onclick="selectHand('paper')" id="btn-paper">パー</button>
                    </div>
                </div>
                <div class="timer-container">
                    <div id="timer">15</div>
                </div>
                <div class="player-info" id="opponent-info">
                    <h3 class="username">相手</h3>
                    <div class="hp-bar-container"><div class="hp-bar"></div></div>
                    <div class="hp-text">HP: 10/10</div>
                    <div class="cost-text">残りコスト: 10</div>
                    <div class="opponent-hand-placeholder">
                        <div>グー</div>
                        <div>チョキ</div>
                        <div>パー</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- BATTLE SCREEN -->
        <div id="battle-screen" class="screen hidden">
            <div class="arena">
                <div id="char-self" class="character">
                    <div class="username">自分</div>
                    <div class="char-body"></div>
                    <div class="chosen-hand-display"></div>
                </div>
                <div id="char-opponent" class="character">
                    <div class="username">相手</div>
                    <div class="char-body"></div>
                    <div class="chosen-hand-display"></div>
                </div>
            </div>
            <div id="battle-log"></div>
        </div>

        <!-- GAME OVER SCREEN -->
        <div id="game-over-screen" class="screen hidden">
            <h2 id="winner-text"></h2>
            <button onclick="location.reload()">ホームに戻る</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/game.js') }}"></script>
</body>
</html>
